# render.yaml — Render Infrastructure as Code
# Render reads this file automatically when you connect the repository.
# It configures the backend service without manual dashboard setup.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: expenseai-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    # Run migrations then start — ensures schema is always up-to-date on deploy
    startCommand: "npx prisma migrate deploy && node dist/server.js"
    # Use the production stage of the multi-stage Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: AI_PROVIDER
        value: rule-based
      - key: GEMINI_API_KEY
        sync: false
      - key: STORAGE_PROVIDER
        value: local
      - key: MAX_FILE_SIZE_MB
        value: "5"
      - key: FRONTEND_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
    healthCheckPath: /health
    plan: free
