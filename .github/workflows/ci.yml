# ============================================================
# .github/workflows/ci.yml — CI/CD Pipeline
# ============================================================
#
# 🎓 TEACHING: What is CI/CD?
#
# CI = Continuous Integration
#   Every time you push code, this pipeline automatically:
#   1. Lints the code (catches style issues)
#   2. Type-checks (catches type errors)
#   3. Runs tests (catches logic bugs)
#   4. Builds the project (catches compilation issues)
#
# CD = Continuous Deployment
#   After CI passes, auto-deploy to staging/production.
#
# WHY? Without CI, bugs reach production. With CI, broken code
# is caught before it merges. Every professional team uses this.
# ============================================================

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ── Backend CI ─────────────────────────────────────────────
  backend:
    name: Backend — Lint, Type Check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: expense_user
          POSTGRES_PASSWORD: expense_pass
          POSTGRES_DB: expense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://expense_user:expense_pass@localhost:5432/expense_test
      DIRECT_URL: postgresql://expense_user:expense_pass@localhost:5432/expense_test
      JWT_ACCESS_SECRET: ci-test-access-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --run --reporter=verbose

  # ── Frontend CI ────────────────────────────────────────────
  frontend:
    name: Frontend — Lint, Type Check, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build

  # ── Docker Build ───────────────────────────────────────────
  docker:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t expenseai-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t expenseai-frontend ./frontend
