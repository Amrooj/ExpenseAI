server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA Routing Fix ───────────────────────────────────────
    # React Router handles routing client-side.
    # Without this, a user navigating directly to /dashboard
    # would get a 404 from nginx (it looks for a /dashboard file).
    # This rule: "try to find the file, if not found → serve index.html"
    # React Router then reads the URL and renders the correct page.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────
    # Vite adds content hashes to filenames: main.a3f8c9.js
    # These files can be cached forever — if code changes, the hash changes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
